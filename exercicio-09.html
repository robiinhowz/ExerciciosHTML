<!--

    - Estilo Base do Container:

        Centralizar o .container-form na tela. Uma boa prática é aplicar Flexbox no body (display: flex; justify-content: center; align-items: center; min-height: 100vh;).

        Aplicar no .container-form um fundo branco, bordas arredondadas, uma sombra suave (box-shadow) e limitar a largura (ex: max-width: 500px; width: 100%; padding: 30px;).

        Utilizar Flexbox na .form-contato (display: flex; flex-direction: column; gap: 20px;) para garantir que os grupos de campos fiquem com um espaçamento uniforme, sem precisar usar margens em cada elemento separadamente.

    - Estilização Uniforme de Inputs e Textarea:

        Selecionar todos os input e o textarea de uma vez.

        Remover a borda padrão do navegador e adicionar uma borda sólida cinza clara (border: 1px solid #d1d5db;), além de um padding interno para facilitar a leitura e o clique (ex: 12px).

        Arredondar levemente os cantos (border-radius: 6px;).

        Correção de Tipografia: Garantir que a fonte do textarea acompanhe o padrão da página (adicionando font-family: inherit;), pois muitos navegadores aplicam fontes monoespaçadas por padrão neste elemento.

        Controle de Redimensionamento: Adicionar a propriedade resize: vertical; ao textarea para impedir que o usuário expanda a caixa horizontalmente e quebre o design do container.

    - Acessibilidade e Pseudo-classes de Estado (:focus):

        Obrigatório: Utilizar a pseudo-classe :focus nos input e no textarea. Quando o usuário clicar no campo, a borda deve mudar para a cor primária (ex: azul) e exibir um anel de foco macio (outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);). Isso é essencial para indicar visualmente onde o cursor está.

        Desafio de Validação (Opcional): Aplicar as pseudo-classes :valid e :invalid no campo de tipo email. Se o formato digitado estiver incorreto, a borda pode ficar sutilmente vermelha; se correto, verde.

    - Botão de Envio, Transições e :hover:

        Estilizar o .btn-enviar removendo a borda padrão, adicionando padding generoso (ex: 12px), fonte em negrito e o cursor em formato de mão (cursor: pointer;).

        Definir uma cor de fundo sólida que represente a ação principal (ex: azul escuro) e o texto na cor branca.

        A Animação: Adicionar a propriedade transition: background-color 0.3s ease, transform 0.1s; no estado normal do botão.

        Usar a pseudo-classe :hover para alterar a cor de fundo para um tom levemente mais escuro.

        Toque extra: Adicionar a pseudo-classe :active com transform: scale(0.98); para dar a sensação de que o botão foi fisicamente pressionado.


-->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
    <link rel="stylesheet" href="estiloForm.css">
</head>
<body>

    <main class="container-form">
        <header>
            <h2>Entre em Contato</h2>
            <p>Preencha os dados abaixo e nos envie sua mensagem.</p>
        </header>

        <form action="#" method="POST" class="form-contato">
            <div class="grupo-input">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: João da Silva" required>
            </div>

            <div class="grupo-input">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seuemail@dominio.com" required>
            </div>

            <div class="grupo-input">
                <label for="mensagem">Mensagem</label>
                <!-- Introdução ao textarea para textos longos -->
                <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..." required></textarea>
            </div>

            <div class="acoes-form">
                <!-- Apenas um botão principal de ação -->
                <button type="submit" class="btn-enviar">Enviar Mensagem</button>
            </div>
        </form>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Grade Horária de Aulas do Módulo</title>
</head>
<body>

    <section class="bloco-cronograma">
        <h2 class="titulo-seccao">Horários Académicos</h2>

        <table border="1">
            <caption>Horário das aulas do módulo</caption>

            <thead>
                <tr>
                    <th scope="col">Aula</th>
                    <th scope="col">Horário</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Estruturação Multimídia</td>
                    <td>19:00 - 20:30</td>
                </tr>
            </tbody>
        </table>

        <p>Recursos necessários:</p>
        <ul>
            <li>Computador com IDE configurada</li>
            <li>Arquivos de legenda (.vtt) prontos</li>
        </ul>
    </section>

    <hr>

    <section class="bloco-video">
        <h2>Apresentação da Disciplina</h2>

        <video controls width="640">
            <source src="apresentacao.mp4" type="video/mp4">

            <track
                kind="captions"
                src="legendas.vtt"
                srclang="pt"
                label="Português"
                default>

            O seu navegador não suporta o elemento de vídeo.
        </video>

        <p>Vídeo demonstrativo</p>
    </section>

    <section class="bloco-mapa">
        <h2>Localização do Campus IFF</h2>

        <iframe
            src="https://mapas.iff.edu.br"
            title="Mapa de localização do Campus IFF"
            sandbox="allow-scripts allow-same-origin"
            width="600"
            height="450">
        </iframe>
    </section>

</body>
</html>

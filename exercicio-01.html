<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport">

    <meta name="description"
        content="O Curso de Sistemas de Informação do IFF prepara profissionais com sólida fundamentação em engenharia de computação e arquitetura de desenvolvimento web.">

    <title>Bacharelado em Sistemas de Informação | IFF</title>
</head>

<body>

<header>
    <h1>Área de Contato do Cliente</h1>

    <nav>
        <a href="#">Ajuda</a> |
        <a href="#">Sair</a>
    </nav>
</header>

<main>

    <section>
        <h2>Envie sua mensagem para a nossa equipe de suporte backend</h2>

        <article>

            <form action="/enviar" method="POST">

                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required minlength="3">
                <br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required minlength="5">
                <br><br>

                <label for="celular">Telefone Celular:</label>
                <input type="text" id="celular" name="celular" pattern="[0-9]{11}" required>
                <br><br>

                <label for="msg">Mensagem:</label>
                <textarea id="msg" name="msg"></textarea>
                <br><br>

                <input type="submit" value="Disparar Dados">

            </form>

        </article>

    </section>

    <aside>
        Conteúdo relacionado: suporte técnico e informações do sistema IFF.
    </aside>

</main>

<footer>
    <strong>Suporte Tech 2026</strong><br>
    <em>Termos de Uso do Sistema do IFF</em><br>
    <code>Assinatura técnica do sistema</code><br>
    <time>2026</time>
</footer>

</body>
</html>
